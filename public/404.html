<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | Global Talent Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      color: #334155;
      text-align: center;
    }
    .container { max-width: 480px; padding: 40px 20px; }
    h1 { font-size: 4rem; font-weight: 900; color: #1a2340; margin-bottom: 8px; }
    p { font-size: 1.1rem; margin-bottom: 32px; line-height: 1.8; }
    a {
      display: inline-block;
      background: #1a2340;
      color: #fff;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 9999px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>お探しのページが見つかりませんでした。<br>URLをご確認ください。</p>
    <a href="/">トップページに戻る</a>
  </div>
</body>
</html>
